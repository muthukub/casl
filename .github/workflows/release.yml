name: release-please

on:
  push:
    branches: [master, next]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release-pl.outputs.paths_released }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Prepare release-please config
        id: release-config
        shell: bash
        if: ${{ github.ref_name == 'next' }}
        run: |
          jq '
            .versioning = "prerelease" |
            .prerelease = true |
            .["prerelease-type"] = "rc" |
            .packages |= with_entries(.value += {"prerelease-type": "rc"})
          ' release-please-config.json > release-please-config.generated.json

          echo "manifest_file=.release-please-manifest-next.json" >> "$GITHUB_OUTPUT"
          echo "config_file=release-please-config.generated.json" >> "$GITHUB_OUTPUT"
      - uses: googleapis/release-please-action@v5
        id: release-pl
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ steps.release-config.outputs.config_file || 'release-please-config.json' }}
          manifest-file: ${{ steps.release-config.outputs.manifest_file || '.release-please-manifest.json' }}
  publish:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.paths_released && needs.release.outputs.paths_released != '[]' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
      - name: Publish packages
        env:
          RELEASE_DIST_TAG: ${{ github.ref_name == 'next' && 'next' || 'latest' }}
        run: |
          for p in $(echo '${{ needs.release.outputs.paths_released }}' | jq -r '.[]'); do
            pnpm -r --filter "./$p" release -- --tag "$DIST_TAG"
          done
